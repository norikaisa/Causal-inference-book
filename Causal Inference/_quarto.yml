project:
  type: book
  output-dir: ../docs/zh
  render:
    - index.qmd
    - chapters/*.qmd
    - references.qmd

lang: zh

book:
  title: "临床医学研究中的因果推断"
  subtitle: "Causal Inference in Clinical Medical Research"
  author: "乔霓丹"
  date: today
  search: true
  sidebar:
    style: docked
  page-footer:
    center: "© 2026 乔霓丹 · 采用 CC BY 4.0 许可发布"
  chapters:
    - index.qmd
    - chapters/01-framework.qmd
    - chapters/02-rct.qmd
    - chapters/03-rct-statistics.qmd
    - chapters/04-protocol-consent.qmd
    - chapters/05-survival.qmd
    - chapters/06-meta-analysis.qmd
    - chapters/07-advanced-meta.qmd
    - chapters/08-dag-scm.qmd
    - chapters/09-regression.qmd
    - chapters/10-propensity-score.qmd
    - chapters/11-instrumental-variables.qmd
    - chapters/12-regression-discontinuity.qmd
    - chapters/13-time-series.qmd
    - chapters/14-sensitivity-analysis.qmd
    - chapters/15-mediation.qmd
    - chapters/16-repeated-measures.qmd
    - chapters/17-missing-data.qmd
    - chapters/18-ml-causal-inference.qmd
    - chapters/19-heterogeneity.qmd
    - chapters/20-sequential-decisions.qmd
    - chapters/21-causal-discovery.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    code-copy: true
    code-tools: true
  pdf:
    documentclass: scrreprt
    keep-tex: true
    # 中文 PDF 需用 XeLaTeX，并加载 ctex；若仅发布网页可忽略
    include-in-header:
      text: |
        \usepackage{ctex}

execute:
  freeze: auto
  warning: false
  message: false

editor: visual
